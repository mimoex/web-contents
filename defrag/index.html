<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>最適化中 - ドライブ C</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="window">
  <div class="titlebar">
    <span>最適化中 - ドライブ C</span>
  </div>

  <div class="content">
    <canvas id="defrag" width="640" height="480"></canvas>

    <div class="status">
      <div class="label">ファイル システムを最適化中...</div>
      <div class="progress">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="buttons">
        <button id="btn-stop">中止</button>
        <button id="btn-pause">一時停止</button>
        <button id="btn-details">詳細情報</button>
      </div>
    </div>
  </div>
</div>

<script src="defrag.js"></script>
</body>
</html>
